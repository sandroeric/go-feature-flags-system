services:
  api:
    build:
      context: .
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://launchdarkly:launchdarkly@postgres:5432/launchdarkly?sslmode=disable"
      SYNC_INTERVAL: "5s"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: launchdarkly
      POSTGRES_USER: launchdarkly
      POSTGRES_PASSWORD: launchdarkly
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchdarkly -d launchdarkly"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
